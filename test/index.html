<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario - Labs Architecture</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(180deg, #2c3e50 0%, #2c3e50 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .game-wrapper {
            text-align: center;
            position: relative;
        }

        h1 {
            color: #e52521;
            text-shadow: 3px 3px 0px #000;
            margin-bottom: 10px;
            font-size: 42px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .canvas-container {
            position: relative;
            display: inline-block;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        #gameCanvas {
            border: 6px solid #1a1a1a;
            display: block;
            background: #5c94fc;
        }

        .controls-panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 25px;
            border-radius: 12px;
            margin-top: 15px;
            display: inline-block;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .controls-panel kbd {
            background: #2c3e50;
            color: #fff;
            padding: 4px 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
        }

        .controls-panel span {
            color: #555;
            margin: 0 15px;
            font-size: 14px;
        }

        .status-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            font-family: monospace;
        }

        .architecture-info {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <h1>SUPER MARIO</h1>
        
        <div class="canvas-container">
            <canvas id="gameCanvas" width="800" height="400"></canvas>
            
            <div class="status-panel">
                <div>FPS: <span id="fps">0</span></div>
                <div>Entities: <span id="entityCount">0</span></div>
            </div>
        </div>

        <div class="controls-panel">
            <kbd>←</kbd><kbd>→</kbd> or <kbd>A</kbd><kbd>D</kbd>`Move`<kbd>Space</kbd>`Jump`<kbd>R</kbd>`Restart`
        </div>

        <div class="architecture-info">
            Modular Labs Architecture | ES6 Modules | Component-Entity-System
        </div>
    </div>

    <script type="module">
        import { GameEngine } from './src/game-engine/core.js';
        import { InputSystem } from './src/systems/input.js';
        import { PhysicsSystem } from './src/systems/physics.js';
        import { RenderingSystem, UISystem } from './src/systems/renderer.js';
        import { GameController } from './src/game-controller.js';

        // Initialize game
        const canvas = document.getElementById('gameCanvas');
        
        const engine = new GameEngine(canvas, {
            width: 800,
            height: 400,
            fps: 60
        });

        // Initialize systems
        const inputSystem = new InputSystem();
        const physicsSystem = new PhysicsSystem({
            gravity: 800,
            friction: 0.85,
            airResistance: 0.95
        });
        
        const renderingSystem = new RenderingSystem({
            backgroundColors: {
                skyTop: '#5c94fc',
                skyBottom: '#5c94fc',
                ground: '#4a4a4a'
            }
        });
        
        const uiSystem = new UISystem();

        // Add systems to engine
        engine.addSystem(inputSystem);
        engine.addSystem(physicsSystem);
        engine.addSystem(renderingSystem);
        engine.addSystem(uiSystem);

        // Initialize game controller
        const gameController = new GameController(engine, inputSystem, physicsSystem);

        // Game state callbacks
        gameController.onGameOver((finalScore) => {
            console.log('Game Over! Final Score:', finalScore);
        });

        // Override rendering to include UI and camera
        const originalRender = engine.render.bind(engine);
        engine.render = () => {
            const ctx = engine.ctx;
            
            // Clear and render scene
            renderingSystem.render(ctx, engine.entities, engine.camera);
            
            // Render entities with camera offset
            ctx.save();
            ctx.translate(-engine.camera.x, -engine.camera.y);
            
            for (const entity of engine.entities) {
                if (entity.render && !entity.isRemoved) {
                    entity.render(ctx);
                }
            }
            ctx.restore();
            
            // Render UI overlay
            uiSystem.render(ctx, engine.entities);
            
            // Render game over if needed
            if (gameController.getGameState() === 'gameover') {
                uiSystem.showGameOver(ctx, gameController.getScore());
            }
            
            // Update status panel
            const fps = Math.round(1 / engine.deltaTime);
            document.getElementById('fps').textContent = fps;
            document.getElementById('entityCount').textContent = engine.entities.length;
        };

        // Override camera update to use controller's player
        const originalUpdate = engine.update.bind(engine);
        engine.update = () => {
            // Run standard updates
            for (const system of engine.systems) {
                if (system.update) {
                    system.update(engine.entities, engine.deltaTime);
                }
            }
            
            // Update entities
            for (const entity of engine.entities) {
                if (entity.update && !entity.isRemoved) {
                    entity.update(engine.deltaTime);
                }
            }
            
            // Update game controller
            gameController.update(engine.deltaTime);
            
            // Remove dead entities
            engine.entities = engine.entities.filter(entity => !entity.isRemoved);
        };

        // Load and start game
        gameController.loadLevel('level-1');
        engine.start();

        // Log architecture info
        console.log('%cSuper Mario - Labs Architecture', 'color: #e52521; font-size: 20px; font-weight: bold;');
        console.log('Game Engine:', engine);
        console.log('Systems:', engine.systems);
        console.log('Entities:', engine.entities);
        console.log('Architecture Features:');
        console.log('  - ES6 Modules with proper imports');
        console.log('  - Component-Entity-System pattern');
        console.log('  - Modular game systems (Input, Physics, Rendering)');
        console.log('  - Separate game controller for game logic');
        console.log('  - Base entity class with inheritance');
        console.log('  - Level generator system');
        console.log('  - Event-driven architecture');
        console.log('  - Camera system with smooth following');
    </script>
</body>
</html>
