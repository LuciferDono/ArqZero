<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario - Platformer Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(180deg, #5c94fc 0%, #5c94fc 60%, #4a4a4a 60%, #4a4a4a 100%);
            font-family: 'Arial', sans-serif;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            color: #e52521;
            text-shadow: 3px 3px 0px #000;
            margin-bottom: 10px;
            font-size: 36px;
        }

        #gameCanvas {
            border: 4px solid #000;
            background: linear-gradient(180deg, #5c94fc 0%, #5c94fc 85%, #8b4513 85%, #8b4513 100%);
            display: block;
        }

        .controls-info {
            color: #333;
            margin-top: 15px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-block;
        }

        .score-display {
            font-size: 24px;
            color: #fff;
            text-shadow: 2px 2px 0px #000;
            margin-bottom: 10px;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        .game-over h2 {
            color: #e52521;
            font-size: 36px;
            margin-bottom: 20px;
        }

        .restart-btn {
            background: #e52521;
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
        }

        .restart-btn:hover {
            background: #c41e1a;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>SUPER MARIO</h1>
        <div class="score-display">SCORE: <span id="score">0</span> | LIVES: <span id="lives">3</span></div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div class="controls-info">
            <strong>Controls:</strong> Arrow Keys / WASD to move | SPACE to jump | Collect coins and avoid enemies!
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>GAME OVER</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button class="restart-btn" onclick="restartGame()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game state
        let score = 0;
        let lives = 3;
        let gameRunning = true;
        let cameraX = 0;

        // Player (Mario)
        const player = {
            x: 50,
            y: 300,
            width: 40,
            height: 50,
            velocityX: 0,
            velocityY: 0,
            speed: 5,
            jumpForce: -15,
            gravity: 0.5,
            onGround: false,
            isInvincible: false,
            invincibleTimer: 0
        };

        // Level elements
        let platforms = [];
        let coins = [];
        let enemies = [];

        // Input handling
        const keys = {
            left: false,
            right: false,
            jump: false
        };

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
            if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
                keys.jump = true;
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
            if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.jump = false;
        });

        // Initialize level
        function initLevel() {
            platforms = [
                // Ground platforms
                { x: 0, y: 350, width: 300, height: 50, type: 'ground' },
                { x: 350, y: 350, width: 200, height: 50, type: 'ground' },
                { x: 600, y: 350, width: 150, height: 50, type: 'ground' },
                { x: 800, y: 350, width: 300, height: 50, type: 'ground' },
                { x: 1150, y: 350, width: 200, height: 50, type: 'ground' },
                { x: 1400, y: 350, width: 400, height: 50, type: 'ground' },
                { x: 1850, y: 350, width: 300, height: 50, type: 'ground' },
                
                // Floating platforms
                { x: 300, y: 280, width: 80, height: 20, type: 'brick' },
                { x: 450, y: 220, width: 80, height: 20, type: 'brick' },
                { x: 650, y: 280, width: 80, height: 20, type: 'brick' },
                { x: 850, y: 200, width: 100, height: 20, type: 'brick' },
                { x: 1000, y: 280, width: 80, height: 20, type: 'brick' },
                { x: 1200, y: 220, width: 100, height: 20, type: 'brick' },
                { x: 1350, y: 280, width: 80, height: 20, type: 'brick' },
                { x: 1550, y: 180, width: 100, height: 20, type: 'brick' },
                { x: 1700, y: 250, width: 80, height: 20, type: 'brick' },
                { x: 1800, y: 320, width: 80, height: 20, type: 'brick' },
                { x: 1950, y: 200, width: 100, height: 20, type: 'brick' },
            ];

            coins = [
                { x: 320, y: 240, collected: false },
                { x: 470, y: 180, collected: false },
                { x: 670, y: 240, collected: false },
                { x: 870, y: 160, collected: false },
                { x: 1020, y: 240, collected: false },
                { x: 1230, y: 180, collected: false },
                { x: 1570, y: 140, collected: false },
                { x: 1720, y: 210, collected: false },
                { x: 1970, y: 160, collected: false },
            ];

            enemies = [
                { x: 400, y: 320, width: 35, height: 35, velocityX: -2, alive: true },
                { x: 700, y: 320, width: 35, height: 35, velocityX: 2, alive: true },
                { x: 950, y: 320, width: 35, height: 35, velocityX: -2, alive: true },
                { x: 1300, y: 320, width: 35, height: 35, velocityX: 2, alive: true },
                { x: 1600, y: 320, width: 35, height: 35, velocityX: -2, alive: true },
                { x: 1900, y: 320, width: 35, height: 35, velocityX: 2, alive: true },
            ];
        }

        // Draw functions
        function drawPlayer() {
            ctx.save();
            
            if (player.isInvincible) {
                ctx.globalAlpha = 0.5;
            }

            // Mario body (red overalls)
            ctx.fillStyle = '#e52521';
            ctx.fillRect(player.x - cameraX, player.y, player.width, player.height * 0.7);
            
            // Mario shirt (blue)
            ctx.fillStyle = '#0066cc';
            ctx.fillRect(player.x - cameraX + 5, player.y + 10, player.width - 10, player.height * 0.2);
            
            // Mario head (skin color)
            ctx.fillStyle = '#f5deb3';
            ctx.fillRect(player.x - cameraX + 10, player.y - 15, player.width - 20, 20);
            
            // Mario hat (red)
            ctx.fillStyle = '#e52521';
            ctx.fillRect(player.x - cameraX + 5, player.y - 20, player.width - 10, 10);
            
            // Mario hat brim
            ctx.fillRect(player.x - cameraX, player.y - 12, 10, 5);
            
            // Mario mustache
            ctx.fillStyle = '#4a2c2a';
            ctx.fillRect(player.x - cameraX + 8, player.y + 3, 15, 3);
            
            // Eyes
            ctx.fillStyle = '#000';
            ctx.fillRect(player.x - cameraX + 12, player.y - 10, 3, 3);
            ctx.fillRect(player.x - cameraX + 22, player.y - 10, 3, 3);
            
            ctx.restore();
        }

        function drawPlatform(platform) {
            const colors = {
                ground: '#8b4513',
                brick: '#cd853f'
            };
            
            ctx.fillStyle = colors[platform.type];
            ctx.fillRect(platform.x - cameraX, platform.y, platform.width, platform.height);
            
            // Add brick pattern
            ctx.strokeStyle = '#5a3d2b';
            ctx.lineWidth = 2;
            for (let i = 0; i < platform.width; i += 20) {
                ctx.beginPath();
                ctx.moveTo(platform.x - cameraX + i, platform.y);
                ctx.lineTo(platform.x - cameraX + i, platform.y + platform.height);
                ctx.stroke();
            }
        }

        function drawCoin(coin) {
            if (coin.collected) return;
            
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.arc(coin.x - cameraX, coin.y, 12, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#ffaa00';
            ctx.beginPath();
            ctx.arc(coin.x - cameraX, coin.y, 8, 0, Math.PI * 2);
            ctx.fill();
            
            // Coin shine
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(coin.x - cameraX - 3, coin.y - 3, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawEnemy(enemy) {
            if (!enemy.alive) return;
            
            // Goomba body (brown)
            ctx.fillStyle = '#8b4513';
            ctx.beginPath();
            ctx.arc(enemy.x - cameraX + enemy.width / 2, enemy.y + enemy.height / 2, enemy.width / 2, 0, Math.PI * 2);
            ctx.fill();
            
            // Goomba face
            ctx.fillStyle = '#d2691e';
            ctx.fillRect(enemy.x - cameraX + 8, enemy.y + 8, enemy.width - 16, enemy.height - 16);
            
            // Angry eyes
            ctx.fillStyle = '#fff';
            ctx.fillRect(enemy.x - cameraX + 8, enemy.y + 10, 8, 8);
            ctx.fillRect(enemy.x - cameraX + 20, enemy.y + 10, 8, 8);
            
            ctx.fillStyle = '#000';
            ctx.fillRect(enemy.x - cameraX + 12, enemy.y + 12, 4, 4);
            ctx.fillRect(enemy.x - cameraX + 24, enemy.y + 12, 4, 4);
            
            // Eyebrows (angry)
            ctx.fillStyle = '#000';
            ctx.fillRect(enemy.x - cameraX + 6, enemy.y + 8, 10, 2);
            ctx.fillRect(enemy.x - cameraX + 20, enemy.y + 8, 10, 2);
            
            // Feet
            ctx.fillStyle = '#000';
            ctx.fillRect(enemy.x - cameraX + 2, enemy.y + enemy.height - 5, 10, 5);
            ctx.fillRect(enemy.x - cameraX + enemy.width - 12, enemy.y + enemy.height - 5, 10, 5);
        }

        function drawBackground() {
            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#5c94fc');
            gradient.addColorStop(0.85, '#5c94fc');
            gradient.addColorStop(1, '#4a4a4a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Clouds
            ctx.fillStyle = '#fff';
            drawCloud(100 - cameraX * 0.3, 50);
            drawCloud(300 - cameraX * 0.3, 80);
            drawCloud(500 - cameraX * 0.3, 40);
            drawCloud(700 - cameraX * 0.3, 70);
            drawCloud(900 - cameraX * 0.3, 50);
            drawCloud(1100 - cameraX * 0.3, 80);
            
            // Hills
            ctx.fillStyle = '#228b22';
            drawHill(50 - cameraX * 0.5, 350, 100);
            drawHill(400 - cameraX * 0.5, 350, 80);
            drawHill(700 - cameraX * 0.5, 350, 120);
            drawHill(1000 - cameraX * 0.5, 350, 90);
            drawHill(1300 - cameraX * 0.5, 350, 110);
            drawHill(1600 - cameraX * 0.5, 350, 80);
            drawHill(1900 - cameraX * 0.5, 350, 100);
        }

        function drawCloud(x, y) {
            ctx.beginPath();
            ctx.arc(x, y, 25, 0, Math.PI * 2);
            ctx.arc(x + 25, y - 10, 20, 0, Math.PI * 2);
            ctx.arc(x + 50, y, 25, 0, Math.PI * 2);
            ctx.arc(x + 25, y + 5, 20, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawHill(x, y, height) {
            ctx.beginPath();
            ctx.moveTo(x, y + height);
            ctx.quadraticCurveTo(x + height / 2, y - height, x + height, y + height);
            ctx.fill();
        }

        // Collision detection
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // Update functions
        function updatePlayer() {
            // Horizontal movement
            if (keys.left) {
                player.velocityX = -player.speed;
            } else if (keys.right) {
                player.velocityX = player.speed;
            } else {
                player.velocityX *= 0.8;
            }

            // Jumping
            if (keys.jump && player.onGround) {
                player.velocityY = player.jumpForce;
                player.onGround = false;
            }

            // Apply gravity
            player.velocityY += player.gravity;

            // Update position
            player.x += player.velocityX;
            player.y += player.velocityY;

            // Prevent going out of bounds
            if (player.x < 0) player.x = 0;
            if (player.y > canvas.height + 100) {
                loseLife();
            }

            // Platform collision
            player.onGround = false;
            platforms.forEach(platform => {
                if (checkCollision(player, platform)) {
                    // Landing on top
                    if (player.velocityY > 0 && player.y + player.height - player.velocityY <= platform.y + 5) {
                        player.y = platform.y - player.height;
                        player.velocityY = 0;
                        player.onGround = true;
                    }
                    // Hitting from below
                    else if (player.velocityY < 0 && player.y - player.velocityY >= platform.y + platform.height - 5) {
                        player.y = platform.y + platform.height;
                        player.velocityY = 0;
                    }
                    // Hitting from sides
                    else {
                        if (player.velocityX > 0) {
                            player.x = platform.x - player.width;
                        } else if (player.velocityX < 0) {
                            player.x = platform.x + platform.width;
                        }
                    }
                }
            });

            // Camera follow
            const target cameraX = player.x - canvas.width / 3;
            cameraX += (targetCameraX - cameraX) * 0.1;
            cameraX = Math.max(0, cameraX);

            // Invincibility timer
            if (player.isInvincible) {
                player.invincibleTimer--;
                if (player.invincibleTimer <= 0) {
                    player.isInvincible = false;
                }
            }
        }

        function updateEnemies() {
            enemies.forEach(enemy => {
                if (!enemy.alive) return;

                enemy.x += enemy.velocityX;

                // Reverse direction at edges or obstacles
                platforms.forEach(platform => {
                    if (enemy.x <= platform.x || enemy.x + enemy.width >= platform.x + platform.width) {
                        if (enemy.y + enemy.height >= platform.y && enemy.y < platform.y + platform.height) {
                            enemy.velocityX *= -1;
                        }
                    }
                });

                // Enemy-player collision
                if (checkCollision(player, enemy)) {
                    if (player.velocityY > 0 && player.y + player.height < enemy.y + enemy.height / 2) {
                        // Player jumped on enemy
                        enemy.alive = false;
                        player.velocityY = -10;
                        score += 100;
                        updateScore();
                    } else if (!player.isInvincible) {
                        // Player hit by enemy
                        loseLife();
                    }
                }
            });
        }

        function updateCoins() {
            coins.forEach(coin => {
                if (coin.collected) return;

                const coinRect = { x: coin.x - 12, y: coin.y - 12, width: 24, height: 24 };
                if (checkCollision(player, coinRect)) {
                    coin.collected = true;
                    score += 50;
                    updateScore();
                }
            });
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        function updateLives() {
            document.getElementById('lives').textContent = lives;
        }

        function loseLife() {
            lives--;
            updateLives();

            if (lives <= 0) {
                gameOver();
            } else {
                resetPlayerPosition();
                player.isInvincible = true;
                player.invincibleTimer = 120;
            }
        }

        function resetPlayerPosition() {
            player.x = 50;
            player.y = 300;
            player.velocityX = 0;
            player.velocityY = 0;
            cameraX = 0;
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }

        function restartGame() {
            score = 0;
            lives = 3;
            gameRunning = true;
            cameraX = 0;
            updateScore();
            updateLives();
            resetPlayerPosition();
            player.isInvincible = false;
            initLevel();
            document.getElementById('gameOver').style.display = 'none';
            gameLoop();
        }

        // Main game loop
        function gameLoop() {
            if (!gameRunning) return;

            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw background
            drawBackground();

            // Update game state
            updatePlayer();
            updateEnemies();
            updateCoins();

            // Draw game elements
            platforms.forEach(drawPlatform);
            coins.forEach(drawCoin);
            enemies.forEach(drawEnemy);
            drawPlayer();

            // Continue loop
            requestAnimationFrame(gameLoop);
        }

        // Start game
        initLevel();
        gameLoop();
    </script>
</body>
</html>
