name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: "I want to... but currently..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: "ArqZero could..."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: "I also thought about..."
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI / TUI
        - Tools
        - Capabilities / Labs
        - Plugins
        - Provider support
        - Documentation
        - Other
    validations:
      required: true
