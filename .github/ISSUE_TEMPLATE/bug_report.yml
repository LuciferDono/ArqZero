name: Bug Report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
      placeholder: "When I run `arqzero -p 'fix bug'`, it crashes with..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: "I expected ArqZero to..."
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `arqzero`
        2. Type `/model`
        3. Select...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ArqZero version
      placeholder: "2.0.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "v22.0.0"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error output / logs
      description: Paste any relevant error messages
      render: shell
